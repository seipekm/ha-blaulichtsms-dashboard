name: Validate Integration

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Home Assistant 'hassfest' Validation
        uses: home-assistant/actions/hassfest@master

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

  # Hier würden zukünftig die echten Python Unit-Tests laufen
  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio homeassistant
          
      - name: Run Tests
        run: |
          echo "Dies ist ein Platzhalter. Sobald du einen Ordner 'tests' mit Test-Code erstellst, wird pytest ihn ausführen."
          # pytest tests/
